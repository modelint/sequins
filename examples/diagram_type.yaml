# Sequins diagram layout specifications

sm sequence:  # Diagram type: Shlaer-Mellor (xUML) sequence diagram
  abbreviation: SEQ
  about: >
    Show interactions between state machine instances and external domains
  notations:
    - xUML
    - SysML V2
  bead types:  # Each kind of bead that can be strung
    state:
      about: >
        An instance of a state machine enters this state
      default size:
        min height: 10
        min width: 30
        vertical margin: 5
        horizontal margin: 10
