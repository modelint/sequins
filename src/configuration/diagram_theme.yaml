# diagram_themes.yaml

# Here we provide the predefined styling and layout information organized as diagram themes.

default:  # Use these settings if no matching diagram theme found
  canvas: light
  curtain style: Starr sequence diagram
  layout: standard

elevator:  # diagram theme
  curtain style: Starr sequence diagram
  string layout:
    UI:
      color: lime green
      positions: L, R
    TRANS:
      color: aqua
      positions: R-2
    SIO:
      color: magenta
      positions: R-1
  canvas: dark
  layout: standard
