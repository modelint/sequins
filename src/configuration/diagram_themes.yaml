# diagram.yaml

# Here we provide the styling and layout information predefined for the client
# predefined diagram settings. We refer to the collective settings as diagram themes

default:  # Use these settings if no matching client or diagram theme found
  canvas: white
  curtan style: Starr sequence diagram
  layout: standard

# Custom diagram themes defined for each client

mdb:  # Client name
  elevator:  # diagram theme
    curtain style: Starr sequence diagram
    string layout:
      UI:
        color: lime green
        positions: L, R
      TRANS:
        color: aqua
        positions: R-1
      SIO:
        color: magenta
        positions: R-2
    canvas: dark
    curtan style: Starr sequence diagram
    layout: standard
