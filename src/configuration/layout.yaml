# layout.yaml

# Here we specify the spacing within a Curtain Diagram

standard:
  string top gutter: 20
  string bottom gutter: 20
  min bead separation: 20
  min string span: 75
  min bead size:
    height: 10
    width: 60
  min thread separation: 8
  # Space between a target String and the near edge of a thread's message label.
  target string label gap: 30
  # Minimum gap between a bead edge and any thread label text (widens String spacing).
  min bead edge gap: 20
  # Padding between a bead's wrapped label and the bead edge (the wrap boundary is the
  # bead material's standard-size width; longer labels wrap onto more lines).
  bead text padding:
    horizontal: 5
    vertical: 7
